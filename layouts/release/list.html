{{ define "main" }}
<div class="page-content">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}
        <div class="section-content">{{ . }}</div>
    {{ end }}

    <div class="release-list">
        {{ range .Paginator.Pages }}
        <article class="release-item">
            <a href="{{ .Permalink }}">Release ({{ .Date.Format "2006.01.02" }})</a>
        </article>
        {{ end }}
    </div>
</div>
{{ end }}
