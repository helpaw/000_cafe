{{ define "main" }}
<div class="page-content">
    <h1>Release ({{ .Date.Format "2006.01.02" }})</h1>
    <div class="content-body">
        {{ .Content }}
    </div>
    <div class="release-nav">
        {{ with .PrevInSection }}
            <a href="{{ .Permalink }}">← prev</a>
        {{ end }}
        {{ with .NextInSection }}
            <a href="{{ .Permalink }}" style="margin-left:auto">next →</a>
        {{ end }}
    </div>
</div>
{{ end }}
